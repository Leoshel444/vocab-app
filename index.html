<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Vocabulary Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --card: #1e1e1e; --border: #2a2a2a;
    --accent: #c8a96e; --accent2: #6eb5c8; --accent3: #b06ec8; --accent4: #6ec87a;
    --text: #e8e4dc; --muted: #888; --green: #5cb85c; --red: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 24px 16px 80px;
  }
  header { text-align: center; margin-bottom: 24px; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px,5vw,44px); color: var(--accent); letter-spacing: 1px;
  }
  header p { color: var(--muted); font-size: 12px; margin-top: 5px; font-family: 'IBM Plex Mono', monospace; }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 0; width: 100%; max-width: 720px;
    margin-bottom: 24px; border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 20px; font-size: 13px; font-family: 'IBM Plex Mono', monospace;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: color 0.2s, border-color 0.2s; white-space: nowrap;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  .panel { display: none; width: 100%; max-width: 720px; }
  .panel.active { display: flex; flex-direction: column; gap: 16px; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* ── Search ── */
  .search-bar { display: flex; gap: 10px; width: 100%; }
  .search-bar input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 14px 18px; font-size: 18px;
    font-family: 'IBM Plex Mono', monospace; border-radius: 4px; outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar button {
    background: var(--accent); color: #111; border: none; padding: 14px 22px;
    font-size: 15px; font-weight: 700; font-family: 'IBM Plex Sans', sans-serif;
    border-radius: 4px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; white-space: nowrap;
  }
  .search-bar button:hover { opacity: 0.85; }
  .search-bar button:active { transform: scale(0.97); }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px 24px; }
  .card-title {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--muted); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::after { content:''; flex:1; height:1px; background: var(--border); }

  .word-header {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 4px solid var(--accent); border-radius: 4px;
    padding: 20px 24px; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .word-main { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .word-en { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--accent); line-height: 1; }
  .word-phonetic { font-family: 'IBM Plex Mono', monospace; font-size: 15px; color: var(--accent2); }
  .word-ka { font-size: 20px; color: var(--text); font-weight: 300; }
  .part-of-speech {
    display: inline-block; background: #2a2a2a; border: 1px solid var(--border);
    color: var(--muted); padding: 4px 12px; font-size: 11px;
    font-family: 'IBM Plex Mono', monospace; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 1px; margin-top: 6px;
  }
  .word-header-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .youglish-btn {
    background: transparent; border: 1px solid var(--accent2); color: var(--accent2);
    padding: 7px 14px; font-size: 12px; font-family: 'IBM Plex Mono', monospace;
    border-radius: 4px; text-decoration: none; display: inline-flex;
    align-items: center; gap: 5px; transition: background 0.2s;
  }
  .youglish-btn:hover { background: rgba(110,181,200,0.1); }
  .save-btn {
    background: transparent; border: 1px solid var(--accent4); color: var(--accent4);
    padding: 7px 14px; font-size: 12px; font-family: 'IBM Plex Mono', monospace;
    border-radius: 4px; cursor: pointer; transition: background 0.2s;
  }
  .save-btn:hover { background: rgba(110,200,122,0.1); }
  .save-btn.saved { border-color: var(--muted); color: var(--muted); cursor: default; }

  .tense-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tense-item { background: var(--card); border: 1px solid var(--border); border-radius: 3px; padding: 10px 14px; }
  .tense-label { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .tense-value { font-size: 15px; color: var(--text); font-style: italic; }

  .sentence-list { display: flex; flex-direction: column; gap: 12px; }
  .sentence-item { border-left: 2px solid var(--accent); padding-left: 14px; }
  .sentence-item .en { font-size: 16px; color: var(--text); line-height: 1.5; }
  .sentence-item .en strong { color: var(--accent); }
  .sentence-item .ka { font-size: 13px; color: var(--muted); margin-top: 3px; }

  .synonym-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 6px 14px; border-radius: 20px; font-size: 14px;
    font-family: 'IBM Plex Mono', monospace; cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Memory ── */
  .memory-card {
    background: var(--surface); border: 1px solid rgba(176,110,200,0.3);
    border-left: 4px solid var(--accent3); border-radius: 4px;
    padding: 20px 24px; display: flex; flex-direction: column; gap: 18px;
  }
  .mem-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted);
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .mem-label::after { content:''; flex:1; height:1px; background: var(--border); }
  .etymology-box {
    background: var(--card); border: 1px solid rgba(176,110,200,0.2);
    border-radius: 4px; padding: 12px 16px; font-size: 14px; line-height: 1.8;
  }
  .root {
    display: inline-block; background: rgba(176,110,200,0.18);
    border: 1px solid rgba(176,110,200,0.35); color: var(--accent3);
    padding: 0 7px; border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px;
  }
  .mnemonic-box {
    background: var(--card); border: 1px solid rgba(200,169,110,0.2);
    border-radius: 4px; padding: 12px 16px; font-size: 15px; line-height: 1.7;
  }
  .mnemonic-box em { color: var(--accent); font-style: italic; }
  .visual-assoc {
    display: flex; align-items: center; gap: 16px; background: var(--card);
    border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px;
  }
  .visual-emoji { font-size: 36px; line-height: 1; flex-shrink: 0; }
  .visual-desc { font-size: 14px; line-height: 1.6; }
  .visual-desc strong { color: var(--accent); }
  .story-box {
    background: var(--card); border: 1px solid rgba(110,200,122,0.25);
    border-radius: 4px; padding: 16px 20px 16px 28px;
    font-size: 15px; line-height: 1.8;
    font-family: 'Playfair Display', serif; font-style: italic; position: relative;
  }
  .story-box::before {
    content:'"'; position: absolute; top: 2px; left: 8px;
    font-size: 44px; color: var(--accent4); opacity: 0.35;
    font-family: 'Playfair Display', serif; line-height: 1;
  }
  .story-box strong { color: var(--accent4); font-style: normal; }

  /* ── Quiz ── */
  .quiz-section { background: var(--surface); border: 1px solid var(--accent); border-radius: 4px; padding: 20px 24px; }
  .quiz-q { font-size: 17px; line-height: 1.6; margin-bottom: 16px; }
  .quiz-q strong { color: var(--accent); }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .quiz-opt {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 4px; cursor: pointer; font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif; text-align: left; transition: border-color 0.15s;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--accent); }
  .quiz-opt.correct { border-color: var(--green); color: var(--green); background: rgba(92,184,92,0.08); }
  .quiz-opt.wrong   { border-color: var(--red);   color: var(--red);   background: rgba(192,57,43,0.08); }
  .quiz-feedback { font-size: 14px; min-height: 20px; font-family: 'IBM Plex Mono', monospace; }
  .quiz-feedback.ok  { color: var(--green); }
  .quiz-feedback.err { color: var(--red); }

  /* ── Review Panel ── */
  .review-header {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 4px solid var(--accent4); border-radius: 4px; padding: 16px 20px;
  }
  .review-header h2 { font-family: 'Playfair Display', serif; color: var(--accent4); font-size: 22px; }
  .review-header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .review-empty {
    text-align: center; padding: 48px 24px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 2;
  }

  .review-word-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    padding: 16px 20px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .review-word-card.due { border-left: 3px solid var(--accent4); }
  .review-word-card.upcoming { border-left: 3px solid var(--border); opacity: 0.6; }
  .rwc-word { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); }
  .rwc-ka { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .rwc-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-align: right; }
  .rwc-meta .due-badge {
    display: inline-block; background: rgba(110,200,122,0.15);
    border: 1px solid var(--accent4); color: var(--accent4);
    padding: 2px 10px; border-radius: 20px; font-size: 11px; margin-bottom: 4px;
  }
  .rwc-meta .upcoming-badge {
    display: inline-block; color: var(--muted); padding: 2px 0; font-size: 11px; margin-bottom: 4px;
  }

  /* Review quiz */
  .review-quiz-area { display: flex; flex-direction: column; gap: 12px; }
  .review-card-front {
    background: var(--surface); border: 1px solid var(--accent4);
    border-radius: 4px; padding: 32px; text-align: center;
  }
  .review-card-front .big-word {
    font-family: 'Playfair Display', serif; font-size: 42px; color: var(--accent); margin-bottom: 8px;
  }
  .review-card-front .phonetic { font-family: 'IBM Plex Mono', monospace; color: var(--accent2); font-size: 15px; }
  .flip-hint { color: var(--muted); font-size: 12px; margin-top: 16px; font-family: 'IBM Plex Mono', monospace; }

  .review-card-back {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 20px 24px; display: none;
  }
  .review-card-back .translation { font-size: 22px; color: var(--text); margin-bottom: 8px; }
  .review-card-back .pos { color: var(--muted); font-size: 12px; font-family: 'IBM Plex Mono', monospace; }

  .review-actions { display: flex; gap: 10px; }
  .review-actions button {
    flex: 1; padding: 12px; border: none; border-radius: 4px;
    font-size: 14px; font-weight: 600; font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-forgot { background: rgba(192,57,43,0.2); color: var(--red); border: 1px solid var(--red) !important; }
  .btn-hard   { background: rgba(200,169,110,0.15); color: var(--accent); border: 1px solid var(--accent) !important; }
  .btn-knew   { background: rgba(92,184,92,0.15); color: var(--green); border: 1px solid var(--green) !important; }
  .review-actions button:hover { opacity: 0.8; }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 14px 20px;
  }
  .stat { text-align: center; flex: 1; min-width: 60px; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  .loading {
    text-align: center; padding: 48px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 14px; letter-spacing: 3px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .error-msg { text-align: center; padding: 24px; color: var(--red); font-family: 'IBM Plex Mono', monospace; }

  @media(max-width:480px) {
    .tense-grid,.quiz-options,.review-actions { grid-template-columns:1fr; flex-direction:column; }
    .word-header,.visual-assoc { flex-direction:column; align-items:flex-start; }
    .word-header-actions { align-items:flex-start; }
  }
</style>
</head>
<body>

<header>
  <h1>Vocabulary Helper</h1>
  <p>// სიტყვა → ანალიზი → Spaced Repetition → დამახსოვრება</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('lookup')">🔍 სიტყვის ძიება</div>
  <div class="tab" onclick="switchTab('review')" id="reviewTab">📅 გამეორება</div>
  <div class="tab" onclick="switchTab('allwords')">📚 ყველა სიტყვა</div>
</div>

<!-- LOOKUP PANEL -->
<div class="panel active" id="panel-lookup">
  <div class="search-bar">
    <input type="text" id="wordInput" placeholder="enter a word..." autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button onclick="lookupWord()">ძიება</button>
  </div>
  <div id="result"></div>
</div>

<!-- REVIEW PANEL -->
<div class="panel" id="panel-review">
  <div id="reviewContent"></div>
</div>

<!-- ALL WORDS PANEL -->
<div class="panel" id="panel-allwords">
  <div id="allwordsContent"></div>
</div>

<script>
// ────────────────────────────────────────────────
// STORAGE  (uses window.storage from the platform)
// ────────────────────────────────────────────────
const STORAGE_KEY = 'vocab-words-v1';
const INTERVALS = [1, 3, 5, 9, 14, 28]; // days

function today() {
  return new Date().toISOString().slice(0,10); // YYYY-MM-DD
}

function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}

function daysBetween(a, b) {
  return Math.floor((new Date(b) - new Date(a)) / 86400000);
}

async function loadWords() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    return r ? JSON.parse(r.value) : [];
  } catch(e) { return []; }
}

async function saveWords(words) {
  await window.storage.set(STORAGE_KEY, JSON.stringify(words));
}

async function addWord(wordData) {
  const words = await loadWords();
  const exists = words.find(w => w.word.toLowerCase() === wordData.word.toLowerCase());
  if (exists) return false;
  const t = today();
  words.push({
    word: wordData.word,
    phonetic: wordData.phonetic || '',
    translation_ka: wordData.translation_ka,
    part_of_speech: wordData.part_of_speech,
    addedDate: t,
    intervalIndex: 0,          // which interval we're on (0..5)
    nextReview: addDays(t, INTERVALS[0]),
    reviewDates: [],            // log of actual review dates
  });
  await saveWords(words);
  return true;
}

async function markReviewed(word, quality) {
  // quality: 'forgot'=0, 'hard'=1, 'knew'=2
  const words = await loadWords();
  const w = words.find(x => x.word.toLowerCase() === word.toLowerCase());
  if (!w) return;
  w.reviewDates.push({ date: today(), quality });
  if (quality === 'forgot') {
    w.intervalIndex = 0;
  } else if (quality === 'hard') {
    w.intervalIndex = Math.max(0, w.intervalIndex); // stay same
  } else {
    w.intervalIndex = Math.min(INTERVALS.length - 1, w.intervalIndex + 1);
  }
  w.nextReview = addDays(today(), INTERVALS[w.intervalIndex]);
  await saveWords(words);
}

// ────────────────────────────────────────────────
// TABS
// ────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['lookup','review','allwords'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if (name === 'review') renderReview();
  if (name === 'allwords') renderAllWords();
}

// ────────────────────────────────────────────────
// LOOKUP
// ────────────────────────────────────────────────
const API_URL = "/api/claude";
let currentData = null;

document.getElementById("wordInput").addEventListener("keydown", e => {
  if (e.key === "Enter") lookupWord();
});

async function lookupWord() {
  const word = document.getElementById("wordInput").value.trim();
  if (!word) return;
  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "block";
  resultDiv.innerHTML = `<div class="loading">ANALYZING...</div>`;

  const prompt = `Analyze the English word "${word}". Return ONLY raw JSON, no markdown, no backticks:

{
  "word": "${word}",
  "phonetic": "/IPA/",
  "translation_ka": "Georgian translation",
  "part_of_speech": "noun or verb or adjective etc",
  "tenses": null,
  "sentences": [
    {"en": "Sentence using **${word}**.", "ka": "Georgian translation"},
    {"en": "Second with **${word}**.", "ka": "Georgian translation"},
    {"en": "Third with **${word}**.", "ka": "Georgian translation"}
  ],
  "synonyms": ["s1","s2","s3","s4","s5"],
  "memory": {
    "etymology": "Etymology with HTML <span class='root'>root</span> tags. 2 sentences.",
    "mnemonic": "Fun mnemonic, can use Georgian sound-alikes.",
    "visual_emoji": "2-3 emojis",
    "visual_desc": "Vivid visual scene. Use <strong>tags</strong> for key word.",
    "story": "2-3 sentence micro-story. Bold target word with <strong>${word}</strong>."
  },
  "quiz": {
    "question": "English fill-in-the-blank ___ with Georgian hint in parentheses.",
    "options": ["opt0","opt1","opt2","opt3"],
    "correct_index": 2
  }
}

RULES: tenses=null unless verb (then provide present/past_simple/past_participle/present_participle/third_person_singular). Shuffle quiz options, correct_index = actual position. Raw JSON only.`;

  try {
    const res = await fetch(API_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1600,
        messages:[{role:"user",content:prompt}] })
    });
    const data = await res.json();
    const raw = data.content.map(b=>b.text||'').join('');
    const clean = raw.replace(/```json|```/g,'').trim();
    currentData = JSON.parse(clean);
    await renderLookup(currentData);
  } catch(err) {
    resultDiv.innerHTML = `<div class="error-msg">❌ შეცდომა: ${err.message}</div>`;
  }
}

async function renderLookup(d) {
  const resultDiv = document.getElementById("result");
  const words = await loadWords();
  const alreadySaved = words.some(w => w.word.toLowerCase() === d.word.toLowerCase());
  const isVerb = d.tenses !== null && typeof d.tenses === 'object';

  const tensesHTML = isVerb ? `
    <div class="card">
      <div class="card-title">Verb Tenses</div>
      <div class="tense-grid">
        ${Object.entries(d.tenses).map(([k,v])=>`
          <div class="tense-item">
            <div class="tense-label">${k.replace(/_/g,' ')}</div>
            <div class="tense-value">${v}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  const sentencesHTML = d.sentences.map(s=>`
    <div class="sentence-item">
      <div class="en">${s.en.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}</div>
      <div class="ka">${s.ka}</div>
    </div>`).join('');

  const synonymsHTML = d.synonyms.map(s=>
    `<span class="chip" onclick="searchWord('${s.replace(/'/g,"\\'")}'">${s}</span>`
  ).join('');

  const m = d.memory;

  const opts = d.quiz.options;

  resultDiv.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:16px;animation:fadeIn 0.4s ease">
      <div class="word-header">
        <div>
          <div class="word-main">
            <span class="word-en">${d.word}</span>
            <span class="word-phonetic">${d.phonetic||''}</span>
          </div>
          <div class="word-ka">${d.translation_ka}</div>
          <span class="part-of-speech">${d.part_of_speech}</span>
        </div>
        <div class="word-header-actions">
          <a class="youglish-btn" href="https://youglish.com/pronounce/${encodeURIComponent(d.word)}/english" target="_blank">🔊 YouGlish</a>
          <button class="save-btn ${alreadySaved?'saved':''}" id="saveBtn" onclick="saveCurrentWord()">
            ${alreadySaved ? '✓ შენახულია' : '+ გამეორებაში დამატება'}
          </button>
        </div>
      </div>

      ${tensesHTML}

      <div class="card">
        <div class="card-title">Example Sentences</div>
        <div class="sentence-list">${sentencesHTML}</div>
      </div>

      <div class="card">
        <div class="card-title">Synonyms</div>
        <div class="synonym-chips">${synonymsHTML}</div>
      </div>

      <div class="memory-card">
        <div class="card-title" style="color:var(--accent3);margin-bottom:0">🧠 Memory Toolkit</div>
        <div>
          <div class="mem-label">📜 Etymology</div>
          <div class="etymology-box">${m.etymology}</div>
        </div>
        <div>
          <div class="mem-label">💡 Mnemonic</div>
          <div class="mnemonic-box">${m.mnemonic}</div>
        </div>
        <div>
          <div class="mem-label">👁️ Visual Association</div>
          <div class="visual-assoc">
            <div class="visual-emoji">${m.visual_emoji}</div>
            <div class="visual-desc">${m.visual_desc}</div>
          </div>
        </div>
        <div>
          <div class="mem-label">📖 Micro-Story</div>
          <div class="story-box">${m.story}</div>
        </div>
      </div>

      <div class="quiz-section">
        <div class="card-title">🎯 Quiz</div>
        <div class="quiz-q">${d.quiz.question}</div>
        <div class="quiz-options">
          ${opts.map((o,i)=>`<button class="quiz-opt" data-correct="${i===d.quiz.correct_index}" onclick="checkAnswer(this)">${o}</button>`).join('')}
        </div>
        <div class="quiz-feedback" id="quizFeedback"></div>
      </div>
    </div>`;
}

async function saveCurrentWord() {
  if (!currentData) return;
  const btn = document.getElementById('saveBtn');
  const added = await addWord(currentData);
  if (added) {
    btn.textContent = '✓ შენახულია';
    btn.classList.add('saved');
    updateReviewBadge();
  }
}

function searchWord(w) {
  document.getElementById("wordInput").value = w;
  lookupWord();
}

function checkAnswer(btn) {
  document.querySelectorAll(".quiz-opt").forEach(b => b.disabled = true);
  const fb = document.getElementById("quizFeedback");
  if (btn.dataset.correct === "true") {
    btn.classList.add("correct");
    fb.textContent = "✓ სწორია!"; fb.className = "quiz-feedback ok";
  } else {
    btn.classList.add("wrong");
    document.querySelectorAll(".quiz-opt").forEach(b => { if(b.dataset.correct==="true") b.classList.add("correct"); });
    fb.textContent = "✗ არასწორია — სწორი გამოჩნდა!"; fb.className = "quiz-feedback err";
  }
}

// ────────────────────────────────────────────────
// REVIEW PANEL
// ────────────────────────────────────────────────
let reviewQueue = [];
let reviewIndex = 0;
let reviewFlipped = false;

async function renderReview() {
  const words = await loadWords();
  const t = today();
  const due = words.filter(w => w.nextReview <= t);
  const upcoming = words.filter(w => w.nextReview > t).sort((a,b)=>a.nextReview.localeCompare(b.nextReview));
  const content = document.getElementById('reviewContent');

  updateReviewBadge();

  if (words.length === 0) {
    content.innerHTML = `
      <div class="review-header"><h2>📅 დღის გამეორება</h2><p>სიტყვები ჯერ არ გაქვთ შენახული</p></div>
      <div class="review-empty">სიტყვის ძიების გვერდზე გადადი და<br/>დაამატე სიტყვები გამეორებაში ✚</div>`;
    return;
  }

  if (due.length === 0) {
    // Show upcoming schedule
    const upcomingHTML = upcoming.slice(0,10).map(w => {
      const daysLeft = daysBetween(t, w.nextReview);
      return `<div class="review-word-card upcoming">
        <div><div class="rwc-word">${w.word}</div><div class="rwc-ka">${w.translation_ka}</div></div>
        <div class="rwc-meta"><div class="upcoming-badge">${daysLeft === 1 ? 'ხვალ' : daysLeft + ' დღეში'}</div><br/>${w.nextReview}</div>
      </div>`;
    }).join('');

    content.innerHTML = `
      <div class="review-header"><h2>✅ დღეს გამეორება არ გაქვს!</h2><p>ყველა სიტყვა გაიმეორე.</p></div>
      ${renderStats(words)}
      <div class="card"><div class="card-title">მომდევნო გამეორებები</div>${upcomingHTML}</div>`;
    return;
  }

  // Start review session
  reviewQueue = [...due];
  reviewIndex = 0;
  reviewFlipped = false;
  renderReviewCard(content);
}

function renderReviewCard(container) {
  if (reviewIndex >= reviewQueue.length) {
    // Done
    container.innerHTML = `
      <div class="review-header" style="border-left-color:var(--accent4)">
        <h2>🎉 გამეორება დასრულდა!</h2>
        <p>${reviewQueue.length} სიტყვა გაიმეორე დღეს.</p>
      </div>
      <div class="review-empty" style="color:var(--accent4)">ბრავო! ხვალ კვლავ შემოდი 💪</div>`;
    updateReviewBadge();
    return;
  }

  const w = reviewQueue[reviewIndex];
  const progress = `${reviewIndex+1} / ${reviewQueue.length}`;
  const intervalLabel = INTERVALS[Math.min(w.intervalIndex, INTERVALS.length-1)];

  container.innerHTML = `
    <div class="review-header">
      <h2>📅 გამეორება</h2>
      <p>${progress} სიტყვა • დღეს გასამეორებელი: ${reviewQueue.length}</p>
    </div>
    ${renderStats_inline()}
    <div class="review-quiz-area">
      <div class="review-card-front" id="cardFront">
        <div class="big-word">${w.word}</div>
        <div class="phonetic">${w.phonetic}</div>
        <div class="flip-hint">დააჭირე რომ ნახო თარგმანი ↓</div>
        <button onclick="flipCard('${w.word}','${w.part_of_speech}','${w.translation_ka.replace(/'/g,"\\'")}', '${intervalLabel}')"
          style="margin-top:20px;background:var(--accent);color:#111;border:none;padding:10px 24px;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;">
          გადაფურცვლა
        </button>
      </div>
      <div class="review-card-back" id="cardBack">
        <div class="translation">${w.translation_ka}</div>
        <div class="pos">${w.part_of_speech}</div>
        <div style="margin-top:10px;font-size:13px;color:var(--muted)">შემდეგი გამეორება: <strong style="color:var(--text)">${INTERVALS[Math.min(w.intervalIndex,INTERVALS.length-1)]} დღეში</strong></div>
      </div>
      <div class="review-actions" id="reviewActions" style="display:none">
        <button class="btn-forgot" onclick="submitReview('${w.word}','forgot')">😕 დავიწყდა</button>
        <button class="btn-hard"   onclick="submitReview('${w.word}','hard')">🤔 ძნელი</button>
        <button class="btn-knew"   onclick="submitReview('${w.word}','knew')">✅ ვიცოდი!</button>
      </div>
    </div>`;
}

function flipCard() {
  document.getElementById('cardBack').style.display = 'block';
  document.getElementById('reviewActions').style.display = 'flex';
  document.querySelector('#cardFront button').style.display = 'none';
  document.querySelector('.flip-hint').style.display = 'none';
}

async function submitReview(word, quality) {
  await markReviewed(word, quality);
  reviewIndex++;
  renderReviewCard(document.getElementById('reviewContent'));
}

function renderStats(words) {
  const t = today();
  const due = words.filter(w => w.nextReview <= t).length;
  const mastered = words.filter(w => w.intervalIndex >= INTERVALS.length-1).length;
  return `<div class="stats-bar">
    <div class="stat"><div class="stat-num">${words.length}</div><div class="stat-label">სულ სიტყვა</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--accent4)">${due}</div><div class="stat-label">დღეს გასამეორ.</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--accent3)">${mastered}</div><div class="stat-label">დაუფლებული</div></div>
  </div>`;
}

function renderStats_inline() {
  return ''; // minimal during review
}

async function updateReviewBadge() {
  const words = await loadWords();
  const t = today();
  const due = words.filter(w => w.nextReview <= t).length;
  const tab = document.getElementById('reviewTab');
  tab.textContent = due > 0 ? `📅 გამეორება (${due})` : '📅 გამეორება';
}

// ────────────────────────────────────────────────
// ALL WORDS PANEL
// ────────────────────────────────────────────────
async function renderAllWords() {
  const words = await loadWords();
  const t = today();
  const content = document.getElementById('allwordsContent');

  if (words.length === 0) {
    content.innerHTML = `<div class="review-empty">სიტყვები ჯერ არ გაქვს დამატებული</div>`;
    return;
  }

  const sorted = [...words].sort((a,b) => b.addedDate.localeCompare(a.addedDate));

  content.innerHTML = `
    ${renderStats(words)}
    <div class="card">
      <div class="card-title">ყველა სიტყვა (${words.length})</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${sorted.map(w => {
          const isDue = w.nextReview <= t;
          const daysLeft = daysBetween(t, w.nextReview);
          const stage = w.intervalIndex + 1;
          return `<div class="review-word-card ${isDue?'due':'upcoming'}">
            <div>
              <div class="rwc-word">${w.word}</div>
              <div class="rwc-ka">${w.translation_ka} · <span style="color:var(--muted);font-size:11px">${w.part_of_speech}</span></div>
              <div style="font-size:11px;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace">
                დამატდა: ${w.addedDate} · ეტაპი ${stage}/${INTERVALS.length}
              </div>
            </div>
            <div class="rwc-meta">
              ${isDue
                ? `<div class="due-badge">გასამეორებელია!</div>`
                : `<div class="upcoming-badge">${daysLeft===1?'ხვალ':daysLeft+' დღეში'}</div>`}
              <div>${w.nextReview}</div>
              <button onclick="deleteWord('${w.word.replace(/'/g,"\\'")}', this)" style="background:none;border:none;color:var(--red);font-size:11px;cursor:pointer;margin-top:4px;font-family:'IBM Plex Mono',monospace;opacity:0.6">წაშლა ✕</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

async function deleteWord(word, btn) {
  const words = await loadWords();
  const filtered = words.filter(w => w.word.toLowerCase() !== word.toLowerCase());
  await saveWords(filtered);
  renderAllWords();
  updateReviewBadge();
}

// ────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────
updateReviewBadge();
</script>
</body>
</html>
